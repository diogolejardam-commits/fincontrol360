<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>FinControl 360°</title>
  <meta name="description" content="Redirecionamento para a Central Oficial FinControl 360°.">
  <meta name="theme-color" content="#6A00FF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinControl 360°">
  <meta name="application-name" content="FinControl 360°">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="https://diogolejardam-commits.github.io/fincontrol360/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://diogolejardam-commits.github.io/fincontrol360/favicon-32.png">
  <style>
    :root {
      --gex-black: #0B0B0B;
      --gex-purple: #6A00FF;
      --gex-purple-dark: #3D008F;
      --gex-white: #F5F7FA;
      --gex-silver: #C0C0C8;
      --gex-gold: #D4AF37;
      --gex-muted: rgba(245, 247, 250, 0.55);
      --gex-border: rgba(212, 175, 55, 0.22);
      --gex-purple-soft: rgba(106, 0, 255, 0.14);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 0%, #1a0a3d 0%, var(--gex-black) 45%, #050505 100%);
      color: var(--gex-white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .card {
      width: min(100%, 400px);
      text-align: center;
      padding: 32px 24px;
      border-radius: 18px;
      border: 1px solid var(--gex-border);
      background: rgba(11, 11, 11, 0.94);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55), 0 0 40px rgba(106, 0, 255, 0.08);
    }
    h1 { margin: 0 0 16px; font-size: 1.25rem; font-weight: 700; line-height: 1.45; color: var(--gex-silver); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 20px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gex-purple-dark) 0%, var(--gex-purple) 100%);
      color: var(--gex-white);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(106, 0, 255, 0.35);
    }
    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--gex-purple-soft);
      border: 1px solid rgba(106, 0, 255, 0.35);
      font-size: 0.8125rem;
      line-height: 1.55;
      color: var(--gex-silver);
      text-align: left;
    }
    .hint strong { color: var(--gex-gold); }
    .spinner {
      width: 22px;
      height: 22px;
      margin: 16px auto 0;
      border: 2px solid rgba(245, 247, 250, 0.15);
      border-top-color: var(--gex-purple);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <p id="fc-msg" class="card-msg">O acesso oficial do FinControl 360° agora está centralizado.</p>
    <a id="fc-central-btn" class="btn" href="https://diogolejardam-commits.github.io/fincontrol360/">Abrir Central FinControl 360°</a>
    <p id="fc-hint" class="hint">Para instalar no iPhone, acesse pelo <strong>Safari</strong> e use <strong>Compartilhar</strong> &gt; <strong>Adicionar à Tela de Início</strong>.</p>
    <div id="fc-spinner" class="spinner" hidden aria-hidden="true"></div>
  </div>
  <script>
    (function () {
      'use strict';
      var CENTRAL_URL = 'https://diogolejardam-commits.github.io/fincontrol360/';
      var APP_URL = 'https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec';
      var isStandalone =
        window.navigator.standalone === true ||
        window.matchMedia('(display-mode: standalone)').matches;

      if (isStandalone) {
        document.getElementById('fc-msg').textContent = 'Abrindo FinControl 360°...';
        document.getElementById('fc-central-btn').style.display = 'none';
        document.getElementById('fc-hint').style.display = 'none';
        document.getElementById('fc-spinner').hidden = false;
        window.setTimeout(function () { window.location.replace(APP_URL); }, 450);
      }
    })();
  </script>
</body>
</html>
