<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>FinControl 360 Pro</title>
  <meta name="description" content="FinControl 360 Pro — gestão financeira premium.">
  <meta name="theme-color" content="#0a1428">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinControl 360 Pro">
  <meta name="application-name" content="FinControl 360 Pro">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="https://diogolejardam-commits.github.io/fincontrol360/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://diogolejardam-commits.github.io/fincontrol360/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://diogolejardam-commits.github.io/fincontrol360/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://diogolejardam-commits.github.io/fincontrol360/icon-512.png">
  <link rel="shortcut icon" href="https://diogolejardam-commits.github.io/fincontrol360/favicon-32.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a1428 0%, #060912 70%, #04060d 100%);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #fc-app-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: 0;
      background: #0a1428;
    }
    #fc-fallback {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      background: radial-gradient(ellipse at center, #0a1428 0%, #060912 70%, #04060d 100%);
    }
    #fc-fallback.is-visible { display: flex; }
    .fc-fallback-card {
      width: min(100%, 380px);
      text-align: center;
      padding: 28px 22px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(10, 20, 40, 0.92);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
    }
    .fc-fallback-logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .fc-fallback-card h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
    }
    .fc-fallback-card p {
      margin: 0;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.55;
    }
    .fc-fallback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 20px;
      padding: 14px 18px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #16a34a 0%, #2563eb 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <iframe
    id="fc-app-frame"
    src="https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec"
    title="FinControl 360 Pro"
    allow="fullscreen; clipboard-read; clipboard-write"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>

  <div id="fc-fallback" role="alert" aria-live="polite">
    <div class="fc-fallback-card">
      <img
        class="fc-fallback-logo"
        src="https://diogolejardam-commits.github.io/fincontrol360/apple-touch-icon.png"
        alt="FinControl 360 Pro"
        width="88"
        height="88"
      >
      <h1>FinControl 360 Pro</h1>
      <p id="fc-fallback-text">Não foi possível carregar o sistema dentro desta janela. Toque abaixo para abrir o link oficial.</p>
      <a id="fc-fallback-btn" class="fc-fallback-btn" href="https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec">Abrir FinControl 360 Pro</a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec';
      var frame = document.getElementById('fc-app-frame');
      var fallback = document.getElementById('fc-fallback');
      var fallbackText = document.getElementById('fc-fallback-text');
      var fallbackBtn = document.getElementById('fc-fallback-btn');
      var iframeFailed = false;

      function showFallback(message) {
        if (iframeFailed) return;
        iframeFailed = true;
        if (message) fallbackText.textContent = message;
        frame.style.display = 'none';
        fallback.classList.add('is-visible');
      }

      function openOfficialTopLevel() {
        window.location.replace(WEB_APP_URL);
      }

      frame.addEventListener('error', function () {
        showFallback('Falha ao carregar o iframe. Toque abaixo para abrir o link oficial.');
      });

      fallbackBtn.addEventListener('click', function (event) {
        event.preventDefault();
        openOfficialTopLevel();
      });

      // Apps Script pode bloquear iframe (X-Frame-Options). Após timeout, oferece abertura direta.
      window.setTimeout(function () {
        try {
          var doc = frame.contentDocument;
          if (!doc || !doc.body || doc.body.childNodes.length === 0) {
            showFallback('O Google Apps Script pode bloquear exibição em iframe. Toque abaixo para abrir o link oficial.');
          }
        } catch (err) {
          showFallback('O Google Apps Script bloqueou o iframe nesta página. Toque abaixo para abrir o link oficial.');
        }
      }, 4500);
    })();
  </script>
</body>
</html>
