<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>FinControl 360</title>
  <meta name="description" content="FinControl 360 — gestão financeira premium.">
  <meta name="theme-color" content="#0a1428">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinControl 360">
  <meta name="application-name" content="FinControl 360">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="https://diogolejardam-commits.github.io/fincontrol360/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://diogolejardam-commits.github.io/fincontrol360/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://diogolejardam-commits.github.io/fincontrol360/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://diogolejardam-commits.github.io/fincontrol360/icon-512.png">
  <link rel="shortcut icon" href="https://diogolejardam-commits.github.io/fincontrol360/favicon-32.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a1428 0%, #060912 70%, #04060d 100%);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .fc-loader-card {
      width: min(100%, 380px);
      text-align: center;
      padding: 28px 22px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(10, 20, 40, 0.92);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
    }
    .fc-loader-logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .fc-loader-card h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
    }
    .fc-loader-card p {
      margin: 0;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.55;
    }
    .fc-loader-spinner {
      width: 22px;
      height: 22px;
      margin: 18px auto 0;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: fc-spin 0.9s linear infinite;
    }
    .fc-open-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 20px;
      padding: 14px 18px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #16a34a 0%, #2563eb 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .fc-open-btn.is-visible { display: inline-flex; }
    @keyframes fc-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="fc-loader-card" role="status" aria-live="polite">
    <img
      class="fc-loader-logo"
      src="https://diogolejardam-commits.github.io/fincontrol360/apple-touch-icon.png"
      alt="FinControl 360"
      width="88"
      height="88"
    >
    <h1>FinControl 360</h1>
    <p id="fc-status-text">Abrindo FinControl 360...</p>
    <div class="fc-loader-spinner" aria-hidden="true"></div>
    <a id="fc-open-btn" class="fc-open-btn" href="https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec">Abrir FinControl 360</a>
  </div>

  <script>
    (function () {
      'use strict';

      var APP_URL = 'https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec';
      var openBtn = document.getElementById('fc-open-btn');
      var statusText = document.getElementById('fc-status-text');

      function openApp() {
        window.location.replace(APP_URL);
      }

      openBtn.addEventListener('click', function (event) {
        event.preventDefault();
        openApp();
      });

      window.addEventListener('load', function () {
        window.setTimeout(openApp, 450);
      });

      window.setTimeout(function () {
        statusText.textContent = 'Se não abrir automaticamente, toque no botão abaixo.';
        openBtn.classList.add('is-visible');
      }, 3500);
    })();
  </script>
</body>
</html>
