<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FinControl 360</title>
<meta name="theme-color" content="#0b1220">
<meta name="application-name" content="FinControl 360">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinControl 360">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="./manifest.webmanifest?v=20260519">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=20260519">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png?v=20260519">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260519">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon.png?v=20260519">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    background:
      radial-gradient(circle at top, rgba(16, 185, 129, 0.16), transparent 36%),
      linear-gradient(180deg, #0f172a 0%, #0b1220 100%);
    color: #e6ecf5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .container {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    text-align: center;
  }
  .logo {
    width: 140px;
    height: 140px;
    border-radius: 30px;
    margin-bottom: 24px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.42);
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
    letter-spacing: -0.6px;
  }
  p {
    font-size: 15px;
    color: #93a4bd;
    margin-bottom: 24px;
    max-width: 320px;
    line-height: 1.55;
  }
  .install-tip {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.25);
    border-radius: 16px;
    padding: 16px 18px;
    margin: 8px 0 24px;
    color: #d7ffe9;
    max-width: 340px;
  }
  .install-tip strong {
    color: #34d399;
    font-size: 14px;
  }
  .install-tip span {
    font-size: 13px;
    line-height: 1.5;
    color: #c5f7df;
  }
  .btn {
    display: inline-block;
    padding: 16px 40px;
    border-radius: 16px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: #ffffff;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 14px 36px rgba(5, 150, 105, 0.28);
  }
</style>
</head>
<body>
<div class="container">
  <img src="./logo.png?v=20260519" alt="Logo FinControl 360" class="logo">
  <h1>FinControl 360</h1>
  <p>Sistema de gestão financeira com atalho pronto para a tela inicial do iPhone.</p>

  <div class="install-tip" id="installTip">
    <strong>Como instalar no iPhone</strong>
    <span>Toque em "Compartilhar" e depois em "Adicionar à Tela de Início".</span>
    <span>Se a logo antiga continuar aparecendo, remova o atalho anterior e adicione novamente.</span>
  </div>

  <a href="https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec" class="btn">Abrir Sistema</a>
</div>

<script>
  var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHjSVSYdbHIEuzuqrWaqe-YZXuvyx21fkiNBiJhZj0eyBoeINCK5D1cD1efnzaLRs6Xg/exec";
  var isStandalone = window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone === true;

  if (isStandalone) {
    window.location.replace(WEB_APP_URL);
  }
</script>
</body>
</html>
