<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FC360">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>FinControl 360</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #0a0a0f; color: #e6edf3; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 2rem;
    }
    .logo { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 1.5rem; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    h1 { font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 0.5rem; }
    h1 .a { color: #8b949e; } h1 .g { color: #3fb950; }
    .sub { font-size: 12px; color: #636e7b; margin-bottom: 2rem; }
    .loading { font-size: 14px; color: #3fb950; margin-bottom: 1rem; }
    .dots::after { content: ''; animation: dots 1.5s steps(4) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
    .manual-link { margin-top: 2rem; }
    .manual-link a { color: #58a6ff; text-decoration: none; padding: 10px 20px; border: 1px solid #58a6ff; border-radius: 10px; display: inline-block; font-size: 14px; }
  </style>
</head>
<body>
  <img class="logo" src="icon-192.png" alt="FinControl 360">
  <h1><span class="a">FIN</span><span class="g">CONTROL</span> <span style="color:#3fb950;font-size:14px">360</span></h1>
  <p class="sub">Gestao Financeira</p>
  <p class="loading">Carregando<span class="dots"></span></p>
  <div class="manual-link">
    <a href="https://script.google.com/macros/s/AKfycbxN8k3wkgS39rvaTA0Oz413IRrS4sdhJApSkLrSQnCBuljRCU2EgFoPvScHNptQIk_rbA/exec">Abrir App</a>
  </div>
  <script>
    setTimeout(function() {
      window.location.href = "https://script.google.com/macros/s/AKfycbxN8k3wkgS39rvaTA0Oz413IRrS4sdhJApSkLrSQnCBuljRCU2EgFoPvScHNptQIk_rbA/exec";
    }, 1500);
  </script>
</body>
</html>
