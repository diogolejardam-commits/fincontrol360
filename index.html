<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FinControl 360° — Página oficial de venda</title>
  <meta name="description" content="A página oficial de venda do FinControl 360° mudou. Você será redirecionado para a oferta atual.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a1428">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta http-equiv="refresh" content="3;url=https://pay.hotmart.com/Q105286190N">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #0a1428 0%, #060912 70%, #04060d 100%);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 32px 28px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    }
    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
      color: #f8fafc;
    }
    .brand span {
      font-weight: 900;
      color: #cbd5e1;
    }
    .msg {
      font-size: 1rem;
      line-height: 1.55;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      max-width: 280px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(148, 163, 184, 0.25);
    }
    .hint {
      margin-top: 20px;
      font-size: 0.8125rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1 class="brand">FinControl <span>360°</span></h1>
    <p class="msg">A página oficial de venda mudou.</p>
    <a class="btn" href="https://pay.hotmart.com/Q105286190N" rel="noopener noreferrer">Ir para a página oficial</a>
    <p class="hint">Redirecionando automaticamente em 3 segundos…</p>
  </main>
  <script>
    (function () {
      var dest = 'https://pay.hotmart.com/Q105286190N';
      setTimeout(function () { window.location.replace(dest); }, 3000);
    })();
  </script>
</body>
</html>
